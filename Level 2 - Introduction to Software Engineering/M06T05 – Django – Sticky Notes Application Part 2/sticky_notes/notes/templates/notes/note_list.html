{% extends 'notes/base.html' %}
{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>My Sticky Notes</h1>
        <a href="{% url 'note_create' %}" class="btn btn-primary">+ Add Note</a>
    </div>

    <div class="sticky-note-container">
        {% for note in notes %}
            <div class="sticky-note">
                <div class="note-title">{{ note.title }}</div>
                <div class="note-content">{{ note.content }}</div>

                <div class="note-footer">
                    <a href="{% url 'note_update' note.id %}" class="btn btn-sm btn-outline-dark me-2">Edit</a>
                    <form action="{% url 'note_delete' note.id %}" class="d-inline" method="POST">
                    {% csrf_token %}
                        <button type="submit" class="btn btn-sm btn-outline-danger">
                            Delete
                        </button>
                    </form>
                </div>
            </div>
        {% empty %}
            <p>No notes found. Create one!</p>
        {% endfor %}
    </div>
{% endblock %}
