<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale= 1.0" />
        <title>Products</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
    <body>
        <div class="container">
        <div class = "row">
            <header class = "col-md-12"><h1 style = "font-size: 50px; font-weight: bold; color: blue">Shopping List!</h1></header>
        </div>
        <div class = "row">
            <div class = "col-md-3">
            <img
                    src="butter.webp"
                    class="img-fluid"
                    alt="Image shows butter"
                    height="200px"
            />
            <h2>Butter £1.10p</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-3">
            <img
                    src="apples.webp"
                    class="img-fluid"
                    alt="Image shows apples"
                    height="200px"
            />
            <h2>Apples £1.28p</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-3">
            <img
                    src="book.jpeg"
                    class="img-fluid"
                    alt="Image shows a book"
                    height="200px"
            />
            <h2>Book £7.99</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-3">
            <img
                    src="bourbons.jpeg"
                    class="img-fluid"
                    alt="Image shows a packet of bourbons"
                    height="800px"
            />
            <h2>Bourbons £0.89p</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div></div>
        <div class="row">
            <div class = "col-md-2">
                 <img
                    src="croissant.jpeg"
                    class="img-fluid"
                    alt="Image shows a croissant"
                    height="200px"
            />
            <h2>Croissant £0.70p</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-2">
                <img
                    src="jam.webp"
                    class="img-fluid"
                    alt="Image shows a jam jar"
                    height="200px"
            />
            <h2>Jam £1.22</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-2">
                <img
                    src="oranges.jpeg"
                    class="img-fluid"
                    alt="Image shows oranges"
                    height="200px"
            />
            <h2>Orange £1.20</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-2">
                <img
                    src="potato.webp"
                    class="img-fluid"
                    alt="Image shows potatoes"
                    height="200px"
            />
            <h2>Potatoes £0.99p</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-2">
                <img
                    src="specialk.webp"
                    class="img-fluid"
                    alt="Image shows a box of Special K"
                    height="200px"
            />
            <h2>Special K £3.20</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
            <div class = "col-md-2">
                 <img
                    src="steak.webp"
                    class="img-fluid"
                    alt="Image shows a nice steak"
                    height="200px"
            />
            <h2>Steak £5.00</h2>
            <button type="button" class="btn btn-light">Buy now!</button></div>
        </div>
        <footer>
            <div class = "row">
                <div class = "col-md-8">
                    <h2 style = "font-size: 50px; font-weight: bold; color: red">Subscribe</h2>
                    <p>Put your contact details below to receive offer emails!</p>
                    <form>
                        <label for="fname">First name:</label><br>
                        <input type="text" id="fname" name="fname"><br>
                        <label for="lname">Last name:</label><br>
                        <input type="text" id="lname" name="lname"><br>
                        <label for="email">Email:</label><br>
                        <input type="text" id="email" name="email">
                    </form>
                </div>
                <div class = "col-md-4">
                    <img style ="text-align: center"
                    src="tesco.svg"
                    class="img-fluid"
                    alt="Image shows the Tesco logo"
                    height="100px"
                />
            </div></div>
        </footer>
    </div></body>
</html>
