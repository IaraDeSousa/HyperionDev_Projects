{% extends 'news/base.html' %}

{% block content %}
<div class="news-container mt-5">
    <div class="edit-wrapper" style="max-width: 800px; margin: 60px auto; padding: 40px; border: 2px solid #000; background: #fff;">
        
        <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 30px; border-bottom: 2px solid #000; padding-bottom: 10px;">
            Edit Archived Newsletter
        </h2>

        <form method="post">
            {% csrf_token %}

            <div class="mb-4">
                <label style="display: block; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 12px;">
                    Newsletter Subject
                </label>
                <input type="text" name="subject" value="{{ newsletter.title }}" required 
                       style="width: 100%; padding: 12px; border: 1px solid #ccc; box-sizing: border-box; font-family: 'Roboto', sans-serif;">
            </div>

            <div class="mb-4">
                <label style="display: block; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; font-size: 12px;">
                    Newsletter Body
                </label>
                <textarea name="content" rows="18" required 
                          style="width: 100%; padding: 15px; border: 1px solid #ccc; font-family: 'Roboto', sans-serif; box-sizing: border-box; line-height: 1.6;">{{ newsletter.content }}</textarea>
                <small style="color: #666; display: block; mt-2;">Note: Editing this archive does not automatically update previously sent emails.</small>
            </div>

            <div class="mt-5">
                <button type="submit" class="btn btn-dark w-100" 
                        style="background: #000; color: #fff; border: 1px solid #000; padding: 15px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 0;">
                    Save Changes to Archive
                </button>
            </div>
        </form>

        <div class="mt-4 text-center">
            <a href="{% url 'newsletter_list' %}" style="color: #000; text-decoration: none; font-size: 14px; font-weight: bold; border-bottom: 1px solid #000;">
                &larr; Cancel and Return to Archive
            </a>
        </div>
    </div>
</div>
{% endblock %}
