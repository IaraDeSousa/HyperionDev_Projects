{% extends 'ecommerce/base.html' %}

{% block content %}
<div class="auth-wrapper" style="max-width: 400px; margin: 50px auto;">
    <h2 class="text-center mb-4">Reset Your Password</h2>
    <p class="text-muted text-center">Enter your email address below and we'll send you a link to reset your password.</p>
    
    <form action="{% url 'password_reset_request' %}" method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" name="email" id="email" class="form-control" placeholder="example@domain.com" required autofocus>
        </div>
        
        <button type="submit" class="btn btn-primary w-100 py-2">Send Reset Email</button>
    </form>
    
    <div class="text-center mt-3">
        <a href="{% url 'login' %}" style="text-decoration: none; color: #6c757d; font-size: 0.9rem;">← Back to Login</a>
    </div>
</div>
{% endblock %}
