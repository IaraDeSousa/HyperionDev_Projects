{% extends 'ecommerce/base.html' %}

{% block content %}
<div class="auth-wrapper">
    <h2 class="text-center mb-4">Create an Account</h2>
    <p class="text-center text-muted mb-4">Join our community of buyers and vendors.</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" placeholder="Choose a username" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" placeholder="email@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" placeholder="Create a strong password" required>
        </div>

        <div class="mb-4">
            <label class="form-label d-block">I want to join as a:</label>
            <div class="btn-group w-100" role="group">
                <input type="radio" class="btn-check" name="account_type" id="buyer" value="buyer" checked autocomplete="off">
                <label class="btn btn-outline-primary" for="buyer">Buyer</label>

                <input type="radio" class="btn-check" name="account_type" id="vendor" value="vendor" autocomplete="off">
                <label class="btn btn-outline-primary" for="vendor">Vendor</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2">Sign Up</button>
    </form>

    <div class="mt-4 text-center">
        <p class="text-muted">Already have an account? <a href="{% url 'login' %}" class="text-primary text-decoration-none">Login here</a></p>
    </div>
</div>
{% endblock %}
