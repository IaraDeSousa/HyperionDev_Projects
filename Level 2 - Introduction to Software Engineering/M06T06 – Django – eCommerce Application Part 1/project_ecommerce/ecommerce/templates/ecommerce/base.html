{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE SHOP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'ecommerce/styles.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="navbar-container">
        <a class="navbar-brand" href="{% url 'product_list' %}">THE SHOP</a>
        
        <div class="nav-links">
            <a href="{% url 'product_list' %}">Home</a>
            
            {% if user.is_authenticated %}
                {% if user.groups.all.0.name == 'vendor' %}
                    <a class="btn btn-warning" href="{% url 'vendor_hub' %}">Vendors</a>
                {% endif %}
                <a href="{% url 'view_cart' %}" style="margin-right: 30px;">
                Cart 
                </a>
                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Logout</button>
                </form>
        
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a class="btn btn-primary" href="{% url 'register' %}">Sign Up</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container">
    {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.bundle.min.js"></script>
</body>
</html>
